<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard POI 2026 · CITE</title>
  <meta name="description" content="Seguimiento y monitoreo de metas del Plan Operativo Institucional 2026 — CITE.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
  <div class="shell">
    <!-- RIEL DE NAVEGACIÓN -->
    <aside class="rail">
      <div class="rail-logo"><img src="assets/logo_cite.png" alt="CITE"
           onerror="this.parentNode.textContent='CT'"></div>
      <nav id="rail-nav" style="display:flex;flex-direction:column;gap:6px;align-items:center;"></nav>
      <div class="rail-spacer"></div>
      <div class="rail-user" title="Sesión">POI</div>
    </aside>

    <!-- PRINCIPAL -->
    <main class="main">
      <!-- HEADER -->
      <header class="topbar">
        <div>
          <div class="titlerow">
            <h1>Dashboard POI 2026</h1>
            <span class="pill-inst">CITE TEXTIL CAMÉLIDOS · CUSCO</span>
          </div>
          <div class="sub" id="view-sub">Plan Operativo Institucional · Seguimiento y monitoreo de metas</div>
        </div>
        <div class="brandmarks">
          <img src="assets/produce.png" alt="Ministerio de la Producción"
               onerror="this.style.display='none'">
          <div class="divider"></div>
          <img src="assets/itp.png" alt="ITP · Red CITE"
               onerror="this.style.display='none'">
        </div>
      </header>

      <!-- BARRA DE FILTROS (se completa desde app.js) -->
      <div class="filterbar" id="filterbar"></div>

      <!-- CONTENIDO -->
      <div class="content">
        <div class="view" id="view">
          <div class="state"><div class="box">
            <div class="spinner"></div>
            <h3>Cargando datos del POI…</h3>
            <p>Leyendo los archivos de <code>data/</code></p>
          </div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Librerías y aplicación (todo local, sin servidor de aplicación) -->
  <script src="js/lib/xlsx.full.min.js"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/metrics.js?v=2"></script>
  <script src="js/charts.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
